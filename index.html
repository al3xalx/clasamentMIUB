<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasament Concurs</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; }
        h2 { margin-top: 0; color: #1a73e8; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .radio-group { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .radio-option { flex: 1; display: flex; align-items: center; gap: 10px; background: #eef5ff; border: 1px solid #d1e3ff; border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: 0.2s; }
        .radio-option:hover { background: #dce8ff; }
        .radio-option input { width: auto; margin: 0; }
        button { background-color: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #1557b0; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #1a73e8; color: white; }
        tr:hover { background-color: #f8f9fa; }
        .gold { background-color: #ffd700 !important; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🏆 Adaugă Scorul</h2>
        <input type="text" id="alias" placeholder="Aliasul tău (ex: Bogdiii)">
        <input type="number" id="score" min="0" placeholder="Punctaj obținut">
        <label>Alege clasa:</label>
        <div class="radio-group">
            <label class="radio-option"><input type="radio" name="clasa" value="11"><span>11</span></label>
            <label class="radio-option"><input type="radio" name="clasa" value="12"><span>12</span></label>
            <label class="radio-option"><input type="radio" name="clasa" value="Șomer"><span>Șomer</span></label>
        </div>
        <label>Alege concursul:</label>
        <select id="concurs">
            <option value="MIUB - Matematică">Matematică</option>
            <option value="MIUB - Informatică">Informatică</option>
            <option value="MIUB - Baze de date">Baze de date</option>
        </select>
        <button id="btnTrimite">Trimite Scorul</button>
    </div>

    <div style="width: 100%; max-width: 800px;">
        <h2>📊 Clasament Live</h2>
        <div style="display: grid; gap: 25px;">
            <div>
                <h3>Matematică</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Loc</th>
                            <th>Alias</th>
                            <th>Scor</th>
                            <th>Clasa</th>
                        </tr>
                    </thead>
                    <tbody id="tabelMatematica"></tbody>
                </table>
            </div>
            <div>
                <h3>Informatică</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Loc</th>
                            <th>Alias</th>
                            <th>Scor</th>
                            <th>Clasa</th>
                        </tr>
                    </thead>
                    <tbody id="tabelInformatica"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- AICI LIPESTE CONFIGURAREA TA DIN PASUL 1 (Pct 10) ---
        const firebaseConfig = {
            apiKey: "AIzaSyB0UQBBeBfMHxIQ9spIs7-LNI7UL9jLvMk",
            authDomain: "clasament-mateinfoub.firebaseapp.com",
            projectId: "clasament-mateinfoub",
            storageBucket: "clasament-mateinfoub.firebasestorage.app",
            messagingSenderId: "264707051723",
            appId: "1:264707051723:web:af04def52b79c221d48b4e",
            measurementId: "G-T6P7LK13JW"
        };
        // -------------------------------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "scoruri");
        const scoreInput = document.getElementById('score');
        const concursSelect = document.getElementById('concurs');

        function updateScoreMax() {
            if (concursSelect.value === "MIUB - Informatică") {
                scoreInput.max = 58;
                scoreInput.placeholder = "Punctaj obținut (max 58)";
            } else {
                scoreInput.removeAttribute('max');
                scoreInput.placeholder = "Punctaj obținut";
            }
        }

        concursSelect.onchange = updateScoreMax;
        updateScoreMax();

        function getSelectedClasa() {
            const selected = document.querySelector('input[name="clasa"]:checked');
            return selected ? selected.value : null;
        }

        function containsBadWords(value) {
            const badWords = [
                "pula", "muie", "pizda", "pizdă", "pizdar", "pizdulica", "cacat", "rahat", "kkt", "cur", "curva", "curvă", "curvari", "curvar",
                "futut", "fute", "fut", "futai", "fută", "futea", "futut", "suge", "suge pula", "suge pula", "dizvirginat", "sex", "porn", "porno", "xxx",
                "bitch", "fuck", "fucker", "motherfucker", "shit", "ass", "arse", "cunt", "dick", "penis", "vagin", "vagina", "proasta", "idiota",
                "idiot", "retard", "tanga", "curve", "mutra", "bou", "boule", "id**t", "injoraturi", "injuraturi", "injurături", "cacatului", "rahatului",
                "tâmpit", "prost", "prostanac", "curvai", "curvăsă", "fututului"
            ];
            const normalized = value.toLowerCase();
            return badWords.some(word => new RegExp(`\\b${word}\\b`, "i").test(normalized));
        }

        // Funcția de trimitere date
        document.getElementById('btnTrimite').onclick = async () => {
            const alias = document.getElementById('alias').value.trim();
            const score = parseInt(scoreInput.value);
            const concurs = concursSelect.value;
            const clasa = getSelectedClasa();
            const maxScore = 58;

            if (!alias || isNaN(score) || !clasa) {
                alert("Te rugăm să completezi aliasul, scorul și clasa!");
                return;
            }

            if (containsBadWords(alias)) {
                alert("Aliasul conține cuvinte nepermise. Alege alt alias.");
                return;
            }

            if (score < 0 || score > maxScore) {
                alert(`Punctajul pentru ${concurs} trebuie să fie între 0 și ${maxScore}.`);
                return;
            }

            if (concurs === "MIUB - Informatică" && score > 52) {
                alert("ce amuzant esti");
            }

            const targetCollection = concurs === "MIUB - Informatică"
                ? collection(db, "scoruri informatica")
                : concurs === "MIUB - Matematică"
                    ? collection(db, "scoruri matematica")
                    : colRef;

            await addDoc(targetCollection, {
                alias: alias,
                score: score,
                concurs: concurs,
                clasa: clasa,
                data: new Date()
            });
            document.getElementById('alias').value = '';
            scoreInput.value = '';
            document.querySelectorAll('input[name="clasa"]').forEach(i => i.checked = false);
            alert("Scor înregistrat!");
        };

        // Funcția de afișare clasament (Live)
        function updateLeaderboard() {
            const q = query(colRef, orderBy("score", "desc"));

            onSnapshot(q, (snapshot) => {
                const mathRows = [];
                const infoRows = [];
                const bazeRows = [];

                snapshot.forEach(doc => {
                    const d = doc.data();
                    const row = `<tr>
                        <td>0</td>
                        <td>${d.alias}</td>
                        <td>${d.score}</td>
                        <td>${d.clasa || '-'}</td>
                    </tr>`;

                    if (d.concurs === "MIUB - Matematică") {
                        mathRows.push(row);
                    } else if (d.concurs === "MIUB - Informatică") {
                        infoRows.push(row);
                    }
                });

                function numberRows(rows) {
                    return rows.map((row, index) => row.replace('<td>0</td>', `<td>${index + 1}</td>`)).join('');
                }

                document.getElementById('tabelMatematica').innerHTML = numberRows(mathRows);
                document.getElementById('tabelInformatica').innerHTML = numberRows(infoRows);
            });
        }

        updateLeaderboard(); // Incarcare initiala
    </script>
</body>
</html>
